<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ludum Dare 59</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      outline: none;
    }

    #start-overlay {
      position: fixed;
      inset: 0;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;

      pointer-events: none;
    }

    #start-overlay button {
      pointer-events: auto;

      font: 16px sans-serif;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <canvas id="game-canvas" tabindex="0"></canvas>

  <div id="start-overlay">
    <button id="start-webgpu">Start WebGPU</button>
    <button id="start-webgl">Start WebGL</button>
  </div>

  <script type="module">
    const canvas = document.getElementById("game-canvas");
    const overlay = document.getElementById("start-overlay");
    const startWebGpuButton = document.getElementById("start-webgpu");
    const startWebGlButton = document.getElementById("start-webgl");

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      const width = Math.floor(window.innerWidth * dpr);
      const height = Math.floor(window.innerHeight * dpr);

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
    }

    async function startWebGpu() {
      overlay.style.display = "none";
      canvas.focus();

      console.log("Starting WebGPU game...");

      // TODO:
      // import init from "./your_webgpu_wasm.js";
      // await init({ canvas });
    }

    async function startWebGl() {
      overlay.style.display = "none";
      canvas.focus();

      console.log("Starting WebGL game...");

      // TODO:
      // import init from "./your_webgl_wasm.js";
      // await init({ canvas });
    }

    window.addEventListener("resize", resizeCanvas);

    canvas.addEventListener("mousedown", () => canvas.focus());
    canvas.addEventListener("touchstart", () => canvas.focus());

    startWebGpuButton.addEventListener("click", startWebGpu);
    startWebGlButton.addEventListener("click", startWebGl);

    resizeCanvas();
  </script>
</body>
</html>
